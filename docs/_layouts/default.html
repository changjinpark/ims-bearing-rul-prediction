<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    :root {
      --text: #1f2328;
      --muted: #57606a;
      --border: #d0d7de;
      --bg-soft: #f6f8fa;
      --link: #0969da;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }

    h1, h2, h3 {
      line-height: 1.3;
    }

    h1 {
      margin-top: 0;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 2.1rem;
    }

    h2 {
      margin-top: 44px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      font-size: 1.55rem;
    }

    h3 {
      margin-top: 28px;
      font-size: 1.2rem;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
      margin: 12px 0 24px;
      border: 1px solid var(--border);
    }

    code {
      padding: 0.15em 0.35em;
      border-radius: 4px;
      background: var(--bg-soft);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    pre {
      overflow-x: auto;
      padding: 16px;
      border-radius: 6px;
      background: var(--bg-soft);
      line-height: 1.55;
    }

    pre code {
      padding: 0;
      background: transparent;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 28px;
      font-size: 0.95rem;
    }

    th, td {
      padding: 8px 10px;
      border: 1px solid var(--border);
    }

    th {
      background: var(--bg-soft);
      font-weight: 600;
    }

    blockquote {
      margin: 16px 0;
      padding-left: 16px;
      border-left: 4px solid var(--border);
      color: var(--muted);
    }

    @media (max-width: 640px) {
      main {
        padding: 32px 18px 56px;
      }

      h1 {
        font-size: 1.75rem;
      }

      h2 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
